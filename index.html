<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurent Studios | The Creative Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050505; 
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Cinematic Background */
        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
            z-index: 10;
        }

        /* Premium Centered Logo Glow */
        .hero-logo {
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.1));
            transition: all 0.5s ease;
        }
        .hero-logo:hover {
            filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.3));
            transform: scale(1.02);
        }

        .glass { 
            background: rgba(15, 15, 15, 0.6); 
            backdrop-filter: blur(30px); 
            border: 1px solid rgba(255,255,255,0.03); 
        }

        .nav-link {
            letter-spacing: 0.3em;
            font-size: 0.75rem;
            color: #64748b;
            transition: all 0.3s ease;
            position: relative;
        }

        .active-tab { 
            color: #ffffff !important;
        }
        .active-tab::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: white;
        }

        .btn-premium {
            background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .gig-entry {
            animation: slideUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Subtle scrollbar for that pro look */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body class="pb-20">

    <div class="vignette"></div>

    <header class="relative z-20 pt-16 pb-12 flex flex-col items-center">
        <img src="logo.png" alt="Aurent Studios" class="h-32 w-auto hero-logo mb-6" 
             onerror="this.src='logo.jpg'">
        <div class="text-xs font-bold tracking-[0.5em] text-slate-500 uppercase">Premium Creative Gigs</div>
    </header>

    <div class="sticky top-0 z-[60] glass border-y border-white/5 py-6 mb-12">
        <div class="flex justify-center gap-16">
            <button id="tab-dashboard" onclick="switchView('dashboard')" class="nav-link active-tab font-extrabold uppercase tracking-[0.4em]">Gigs</button>
            <button id="tab-testimonials" onclick="switchView('testimonials')" class="nav-link font-extrabold uppercase tracking-[0.4em]">Testimonials</button>
        </div>
    </div>

    <main id="view-dashboard" class="container mx-auto max-w-6xl px-6 relative z-20">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10" id="gigs-container">
            <div class="h-96 bg-white/5 rounded-3xl animate-pulse"></div>
            <div class="h-96 bg-white/5 rounded-3xl animate-pulse"></div>
        </div>
    </main>

    <main id="view-testimonials" class="container mx-auto max-w-4xl px-6 py-12 hidden relative z-20">
        <div class="grid gap-16">
            <div class="border-l-2 border-white/10 pl-10">
                <p class="text-3xl font-extralight italic leading-tight text-slate-300">"Aurent is the gold standard. I landed a lead role in a 3D short film within 48 hours of joining."</p>
                <p class="mt-8 text-[10px] font-black tracking-[0.4em] uppercase text-blue-500">JK / Lead Visualizer</p>
            </div>
            <div class="border-l-2 border-white/10 pl-10">
                <p class="text-3xl font-extralight italic leading-tight text-slate-300">"High-ticket gigs only. This is where the real pros in Kenya hang out."</p>
                <p class="mt-8 text-[10px] font-black tracking-[0.4em] uppercase text-blue-500">MM / Creative Director</p>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://nujhdywfoosjwxoxiito.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51amhkeXdmb29zand4b3hpaXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTE5OTQsImV4cCI6MjA5MTM4Nzk5NH0.pfpuA0q4bZOsPQUlr1S6UrFPY49uBQp1SV7lLrbcGQs";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function switchView(view) {
            document.getElementById('view-dashboard').classList.add('hidden');
            document.getElementById('view-testimonials').classList.add('hidden');
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active-tab'));
            
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`tab-${view}`).classList.add('active-tab');
            window.scrollTo({ top: 150, behavior: 'smooth' });
        }

        async function fetchGigs() {
            const { data } = await _supabase.from('gigs').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('gigs-container').innerHTML = data.map((gig, i) => `
                    <div class="gig-entry flex flex-col glass rounded-[2.5rem] overflow-hidden group shadow-2xl" style="animation-delay: ${i * 0.15}s">
                        ${gig.image_link ? `
                        <div class="overflow-hidden h-[400px]">
                            <img src="${gig.image_link}" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-1000 scale-105 group-hover:scale-100">
                        </div>` : ''}
                        <div class="p-12">
                            <div class="text-[9px] font-black text-blue-500 uppercase tracking-[0.5em] mb-6">New Lead / Internal</div>
                            <h3 class="text-2xl font-bold mb-6 tracking-tight leading-tight">${gig.title}</h3>
                            <p class="text-slate-400 text-sm leading-relaxed mb-10 font-light opacity-80">${gig.description.substring(0, 450)}</p>
                            <div class="flex gap-4">
                                <button onclick="window.location.href='https://wa.me/2547XXXXXXXX'" class="flex-1 btn-premium text-white py-5 font-bold text-[11px] uppercase tracking-[0.2em] rounded-2xl">Apply for Gig</button>
                                <button onclick="shareGig('${gig.title}')" class="px-8 border border-white/10 rounded-2xl hover:bg-white hover:text-black transition-all"><i class="fa-solid fa-share-nodes"></i></button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function shareGig(t) { window.open(`https://wa.me/?text=Aurent Internal Lead: ${t}`); }
        fetchGigs();
    </script>
</body>
</html>
