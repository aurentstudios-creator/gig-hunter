<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurent Studios | Creative Pipeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #ffffff; 
            color: #1a1a1a; 
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 40px 40px; /* This creates the professional drafting grid */
        }

        .watermark-bg { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 400px; opacity: 0.12; z-index: -1; pointer-events: none; 
        }

        /* Glass effect for cards to let the grid peak through slightly */
        .gig-card { 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #f1f5f9;
            border-radius: 3rem;
            padding: 2.5rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .gig-card:hover {
            border-color: #1d4ed8;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05);
        }

        .nav-link { font-weight: 800; font-size: 0.7rem; letter-spacing: 0.3em; color: #94a3b8; }
        .nav-link.active { color: #1d4ed8; border-bottom: 2px solid #1d4ed8; }

        .overlay { position: fixed; inset: 0; z-index: 1000; background: #fff; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        
        /* Custom Apply Button Gradient */
        .btn-aurent {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-aurent:hover {
            background: #1d4ed8;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="pb-20">

    <img src="logo.png" class="watermark-bg" onerror="this.src='logo.jpg'">

    <div id="onboard-overlay" class="overlay hidden">
        <div class="max-w-md w-full text-center">
            <img src="logo.png" class="h-24 mx-auto mb-8" onerror="this.src='logo.jpg'">
            <h1 class="text-3xl font-extrabold mb-2 tracking-tighter uppercase italic">Welcome to Aurent Gigs</h1>
            <p class="text-blue-600 font-bold italic mb-10 text-sm">"We have to discover to find" — Founder, Aurent Gigs</p>
            
            <div class="text-left bg-slate-50/50 backdrop-blur-md p-6 rounded-3xl mb-10 border border-slate-100 text-[11px] text-slate-500 uppercase font-bold tracking-wider">
                <span class="text-slate-900 block mb-4 border-b pb-2">Operational Protocol</span>
                • 10-Minute Real-Time Synchronization<br>
                • 7-Day Complimentary Entry Protocol<br>
                • Android & Desktop Push-Alerts Active
            </div>

            <button onclick="startApp()" class="w-full bg-black text-white font-bold py-5 rounded-2xl shadow-2xl uppercase text-[10px] tracking-[0.3em]">Initialize Dashboard</button>
        </div>
    </div>

    <nav class="fixed top-0 w-full bg-white/70 backdrop-blur-md z-[100] border-b border-slate-100 px-10 py-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="logo.png" class="h-8" onerror="this.src='logo.jpg'">
            <span class="font-black text-[10px] tracking-widest uppercase">Studio <span class="text-blue-600">Sync</span></span>
        </div>
        <div class="flex gap-8">
            <button onclick="tab('gigs')" id="t-gigs" class="nav-link active">GIGS</button>
            <button onclick="tab('test')" id="t-test" class="nav-link">TESTIMONIALS</button>
            <button onclick="tab('cont')" id="t-cont" class="nav-link">CONTACT</button>
        </div>
    </nav>

    <main class="mt-40 max-w-5xl mx-auto px-6">
        <section id="s-gigs">
            <div id="feed" class="grid grid-cols-1 md:grid-cols-2 gap-10">
                </div>
        </section>

        </main>

    <script>
        const SUPABASE_URL = "https://nujhdywfoosjwxoxiito.supabase.co";
        const SUPABASE_KEY = "your_key";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function startApp() {
            if ("Notification" in window) await Notification.requestPermission();
            localStorage.setItem('aurent_init', 'true');
            localStorage.setItem('aurent_day', new Date().getTime());
            location.reload();
        }

        async function loadFeed() {
            const { data } = await _supabase.from('gigs').select('*').order('id', { ascending: false });
            if (data) {
                document.getElementById('feed').innerHTML = data.map(gig => `
                    <div class="gig-card flex flex-col group">
                        ${gig.image_link ? `
                        <div class="overflow-hidden rounded-[2rem] mb-8 h-72">
                            <img src="${gig.image_link}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        </div>` : ''}
                        <div class="flex-1">
                            <h3 class="text-xl font-black mb-4 uppercase italic tracking-tight text-blue-700">${gig.title}</h3>
                            <p class="text-slate-500 text-sm leading-relaxed mb-8 font-medium line-clamp-3">${gig.description}</p>
                        </div>
                        <div class="flex gap-3 mt-auto">
                            <a href="${gig.apply_link}" target="_blank" class="flex-1 btn-aurent py-4 rounded-xl text-[9px] uppercase tracking-[0.2em] font-black text-center">Open Brief</a>
                            <button onclick="share('${gig.title}')" class="px-6 border border-slate-200 rounded-xl text-slate-400 hover:bg-slate-50"><i class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        if (!localStorage.getItem('aurent_init')) document.getElementById('onboard-overlay').classList.remove('hidden');
        loadFeed();
    </script>
</body>
</html>
