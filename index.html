<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurent Studios | The Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;900&display=swap');
        
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #030303; 
            color: #ffffff;
            background-image: linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* 📱 MOBILE FIX: Prevents image squeezing */
        .feed-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        @media (min-width: 1024px) {
            .feed-container { grid-template-columns: 1fr; }
        }

        .glass-card { 
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            overflow: hidden;
        }

        .luxury-input {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.75rem;
            padding: 1rem;
            color: white;
            width: 100%;
        }

        .nav-link.active { color: #ffffff; border-bottom: 2px solid #2563eb; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="fixed top-0 w-full bg-[#030303]/90 backdrop-blur-xl z-[100] border-b border-white/5 px-6 py-5 flex justify-between items-center">
        <span class="font-black text-[14px] tracking-[0.3em] uppercase">Aurent <span class="text-blue-500 italic">Vault</span></span>
        <div class="flex gap-6 items-center">
            <button onclick="tab('gigs')" id="t-gigs" class="nav-link active text-[10px] font-bold uppercase tracking-widest">Gigs</button>
            <button onclick="tab('cv')" id="t-cv" class="nav-link text-[10px] font-bold uppercase tracking-widest text-blue-400">CV Studio</button>
        </div>
    </nav>

    <main class="mt-32 max-w-5xl mx-auto px-6 flex-grow w-full">
        
        <section id="s-gigs">
            <div id="feed" class="feed-container">
                </div>
        </section>

        <section id="s-cv" class="hidden py-10">
            <div class="glass-card p-8 md:p-12">
                <h2 class="text-3xl font-black mb-6 uppercase tracking-widest">Luxury CV Studio</h2>
                
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <label class="block text-[10px] font-black text-blue-500 uppercase">Passport Photo</label>
                        <input type="file" id="cv-photo" class="luxury-input text-xs" accept="image/*">
                        
                        <input type="text" id="cv-name" placeholder="FULL NAME" class="luxury-input">
                        <input type="text" id="cv-email" placeholder="EMAIL" class="luxury-input">
                        
                        <label class="block text-[10px] font-black text-blue-500 uppercase">Select Layout Style</label>
                        <select id="cv-layout" class="luxury-input">
                            <option value="Executive">The Executive (Classic Sidebar)</option>
                            <option value="Modern">The Modernist (Clean Center)</option>
                            <option value="Tech">The Tech Lead (Bold Header)</option>
                        </select>
                    </div>
                    <div class="space-y-4">
                        <textarea id="cv-summary" placeholder="PROFESSIONAL SUMMARY" rows="3" class="luxury-input"></textarea>
                        <textarea id="cv-experience" placeholder="WORK EXPERIENCE" rows="4" class="luxury-input"></textarea>
                        <textarea id="cv-edu" placeholder="EDUCATION" rows="3" class="luxury-input"></textarea>
                        <input type="text" id="cv-skills" placeholder="SKILLS" class="luxury-input">
                    </div>
                </div>

                <button onclick="generateLuxuryPDF()" class="mt-10 w-full bg-blue-600 text-white font-black py-5 rounded-xl uppercase tracking-[0.3em] text-xs hover:bg-white hover:text-black transition-all">
                    Generate Bespoke CV
                </button>
            </div>
        </section>

    </main>

    <script>
        const SUPABASE_URL = "https://nujhdywfoosjwxoxiito.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51amhkeXdmb29zand4b3hpaXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTE5OTQsImV4cCI6MjA5MTM4Nzk5NH0.pfpuA0q4bZOsPQUlr1S6UrFPY49uBQp1SV7lLrbcGQs";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function tab(t) {
            document.getElementById('s-gigs').classList.add('hidden');
            document.getElementById('s-cv').classList.add('hidden');
            document.getElementById('s-'+t).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById('t-'+t).classList.add('active');
        }

        async function loadFeed() {
            const { data } = await _supabase.from('gigs').select('*').order('id', { ascending: false });
            if (data) {
                document.getElementById('feed').innerHTML = data.map(gig => `
                    <div class="glass-card flex flex-col md:flex-row gap-6 p-6">
                        <div class="w-full md:w-1/3">
                            <img src="${gig.image_link}" class="w-full h-auto rounded-xl object-contain bg-black/50">
                        </div>
                        <div class="flex-1">
                            <h3 class="text-xl font-bold uppercase mb-4">${gig.title}</h3>
                            <p class="text-slate-400 text-sm mb-6">${gig.description.substring(0, 200)}...</p>
                            <a href="${gig.apply_link}" target="_blank" class="inline-block w-full bg-white text-black text-center font-black py-3 rounded-lg text-[10px] tracking-widest uppercase">View Opening</a>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function generateLuxuryPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const layout = document.getElementById('cv-layout').value;
            const name = document.getElementById('cv-name').value.toUpperCase();
            const summary = document.getElementById('cv-summary').value;
            const exp = document.getElementById('cv-experience').value;
            const edu = document.getElementById('cv-edu').value;
            const skills = document.getElementById('cv-skills').value;

            // --- 🎨 LAYOUT 1: THE EXECUTIVE ---
            if (layout === "Executive") {
                doc.setFillColor(139, 30, 63); doc.rect(0, 0, 70, 297, 'F'); // Sidebar
                doc.setTextColor(255, 255, 255); doc.setFontSize(20); doc.text(doc.splitTextToSize(name, 50), 10, 80);
                doc.setTextColor(40, 40, 40); doc.setFontSize(22); doc.text("PROFESSIONAL PROFILE", 80, 25);
                doc.setFontSize(10); doc.text(doc.splitTextToSize(summary, 110), 80, 35);
                doc.setFontSize(16); doc.text("EXPERIENCE", 80, 80);
                doc.setFontSize(10); doc.text(doc.splitTextToSize(exp, 110), 80, 90);
            } 
            
            // --- 🎨 LAYOUT 2: THE MODERNIST ---
            else if (layout === "Modern") {
                doc.setFillColor(30, 30, 30); doc.rect(0, 0, 210, 50, 'F'); // Header
                doc.setTextColor(255, 255, 255); doc.setFontSize(26); doc.text(name, 105, 30, {align: 'center'});
                doc.setTextColor(60, 60, 60); doc.setFontSize(12); doc.text("SUMMARY", 20, 70);
                doc.setFontSize(10); doc.text(doc.splitTextToSize(summary, 170), 20, 80);
                doc.setFontSize(12); doc.text("WORK HISTORY", 20, 120);
                doc.setFontSize(10); doc.text(doc.splitTextToSize(exp, 170), 20, 130);
            }

            // --- 🎨 LAYOUT 3: THE TECH LEAD ---
            else {
                doc.setDrawColor(37, 99, 235); doc.setLineWidth(2); doc.line(10, 10, 200, 10); // Tech Blue Line
                doc.setTextColor(37, 99, 235); doc.setFontSize(28); doc.text(name, 10, 30);
                doc.setTextColor(100, 100, 100); doc.setFontSize(10); doc.text(doc.splitTextToSize(summary, 180), 10, 45);
                doc.setFillColor(240, 240, 240); doc.rect(10, 80, 190, 10, 'F');
                doc.setTextColor(0, 0, 0); doc.text("TECHNICAL EXPERIENCE", 15, 87);
                doc.text(doc.splitTextToSize(exp, 180), 10, 100);
            }

            // Handle Photo Placement
            const photo = document.getElementById('cv-photo').files[0];
            if (photo) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const x = layout === "Executive" ? 10 : 160;
                    doc.addImage(e.target.result, 'JPEG', x, 15, 45, 45);
                    doc.save(`${name}_CV.pdf`);
                };
                reader.readAsDataURL(photo);
            } else {
                doc.save(`${name}_CV.pdf`);
            }
        }

        loadFeed();
    </script>
</body>
</html>
