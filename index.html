<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurent Studios | The Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;900&display=swap');
        
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #030303; 
            color: #ffffff;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            scroll-behavior: smooth;
        }

        .glass-card { 
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; z-index: 10; 
        }
        
        .glass-card:hover {
            border-color: rgba(37, 99, 235, 0.6);
            box-shadow: 0 10px 40px -10px rgba(37, 99, 235, 0.3);
        }

        .nav-link { font-weight: 700; font-size: 0.65rem; letter-spacing: 0.1em; color: #64748b; transition: 0.3s; padding-bottom: 4px; }
        @media (min-width: 768px) { .nav-link { font-size: 0.75rem; letter-spacing: 0.2em; } }
        .nav-link.active { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.5); border-bottom: 2px solid #2563eb; }

        .luxury-input {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.75rem;
            padding: 1rem;
            color: white;
            width: 100%;
            transition: 0.3s;
        }
        .luxury-input:focus {
            outline: none;
            border-color: #2563eb;
            background: rgba(37, 99, 235, 0.05);
        }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-card { opacity: 0; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="flex flex-col min-h-screen relative">

    <div class="ambient-glow fixed top-0 left-1/2 -translate-x-1/2 w-[80vw] h-[50vh] bg-blue-600/10 blur-[120px] -z-10"></div>

    <div id="onboard-overlay" class="fixed inset-0 z-[1000] background-[#030303] flex items-center justify-center p-8 hidden bg-black">
        <div class="max-w-md w-full glass-card p-10 text-center">
            <h1 class="text-4xl font-black mb-2 tracking-widest uppercase italic">Aurent</h1>
            <p class="text-blue-500 font-bold italic mb-8 text-sm">"Discover to Find"</p>
            <button onclick="startApp()" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-[11px] tracking-widest">Enter Vault</button>
        </div>
    </div>

    <nav class="fixed top-0 w-full bg-[#030303]/80 backdrop-blur-xl z-[100] border-b border-white/5 px-4 md:px-10 py-5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="font-black text-[12px] md:text-[14px] tracking-[0.3em] uppercase">Aurent <span class="text-blue-500 italic">Studios</span></span>
        </div>
        <div class="flex gap-4 md:gap-8 items-center">
            <button onclick="tab('gigs')" id="t-gigs" class="nav-link active uppercase">Gigs</button>
            <button onclick="tab('cv')" id="t-cv" class="nav-link uppercase text-blue-400">CV Engine</button>
            <button onclick="tab('cont')" id="t-cont" class="nav-link uppercase">Contact</button>
        </div>
    </nav>

    <main class="mt-32 max-w-5xl mx-auto px-6 relative z-10 flex-grow w-full">
        
        <section id="s-gigs">
            <div class="flex justify-between items-center mb-10 bg-blue-900/10 border border-blue-500/20 p-4 rounded-xl">
                <div class="flex items-center gap-3 text-xs font-bold uppercase tracking-widest text-blue-400">
                    <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div> Live Vault Connected
                </div>
                <div id="trial-counter" class="text-[10px] font-black uppercase tracking-widest text-slate-300"></div>
            </div>
            <div id="feed" class="grid gap-8"></div>
        </section>

        <section id="s-cv" class="hidden py-10">
            <div class="glass-card p-8 md:p-12 mb-10">
                <h2 class="text-3xl font-black mb-2 tracking-widest uppercase">Luxury CV Engine</h2>
                <p class="text-slate-400 mb-10 text-xs italic tracking-widest">Craft a high-end professional presence in seconds.</p>
                
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <label class="block text-[10px] font-black text-blue-500 uppercase">Passport / Professional ID</label>
                        <input type="file" id="cv-photo" class="luxury-input text-xs" accept="image/*">
                        
                        <input type="text" id="cv-name" placeholder="FULL NAME" class="luxury-input">
                        <input type="text" id="cv-phone" placeholder="PHONE NUMBER" class="luxury-input">
                        <input type="email" id="cv-email" placeholder="EMAIL ADDRESS" class="luxury-input">
                        
                        <label class="block text-[10px] font-black text-blue-500 uppercase mt-4">Luxury Theme</label>
                        <select id="cv-theme" class="luxury-input">
                            <option value="Aurent">Aurent Luxury (Burgundy/Gold)</option>
                            <option value="Midnight">Midnight Pro (Blue/Silver)</option>
                            <option value="Onyx">Onyx Minimalist (Black/White)</option>
                        </select>
                    </div>
                    
                    <div class="space-y-4">
                        <textarea id="cv-summary" placeholder="PROFESSIONAL SUMMARY..." rows="3" class="luxury-input"></textarea>
                        <textarea id="cv-experience" placeholder="WORK EXPERIENCE..." rows="4" class="luxury-input"></textarea>
                        <textarea id="cv-edu" placeholder="EDUCATION BACKGROUND..." rows="3" class="luxury-input"></textarea>
                        <input type="text" id="cv-skills" placeholder="SKILLS (COMMAS SEPARATED)" class="luxury-input">
                    </div>
                </div>

                <button onclick="generateCV()" class="mt-10 w-full bg-white text-black font-black py-5 rounded-xl hover:bg-blue-600 hover:text-white transition-all uppercase tracking-[0.3em] text-xs">
                    Generate High-End CV
                </button>
            </div>
        </section>

        <section id="s-cont" class="hidden py-12 text-center">
            <div class="glass-card p-12">
                <h2 class="text-4xl font-black mb-8 tracking-widest uppercase">Community</h2>
                <a href="https://chat.whatsapp.com/KwzvuxIiHgi7MD88SjVEPD" target="_blank" class="inline-flex items-center gap-3 bg-[#25D366] text-black font-black px-10 py-5 rounded-xl uppercase tracking-widest text-xs">
                    <i class="fa-brands fa-whatsapp"></i> Join Official WhatsApp
                </a>
            </div>
        </section>

    </main>

    <footer class="text-center py-10 text-slate-600 text-[10px] font-black tracking-[0.3em] uppercase mt-auto">
        Powered by Aurent Studios 2026
    </footer>

    <script>
        const SUPABASE_URL = "https://nujhdywfoosjwxoxiito.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51amhkeXdmb29zand4b3hpaXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTE5OTQsImV4cCI6MjA5MTM4Nzk5NH0.pfpuA0q4bZOsPQUlr1S6UrFPY49uBQp1SV7lLrbcGQs";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function tab(t) {
            ['s-gigs', 's-cv', 's-cont'].forEach(s => document.getElementById(s).classList.add('hidden'));
            ['t-gigs', 't-cv', 't-cont'].forEach(n => { if(document.getElementById(n)) document.getElementById(n).classList.remove('active') });
            document.getElementById('s-'+t).classList.remove('hidden');
            document.getElementById('t-'+t.substring(0,4) || t).classList.add('active');
        }

        async function startApp() {
            localStorage.setItem('aurent_init', 'true');
            if (!localStorage.getItem('aurent_day')) localStorage.setItem('aurent_day', Date.now().toString());
            document.getElementById('onboard-overlay').classList.add('hidden');
            loadFeed();
        }

        async function loadFeed() {
            const { data } = await _supabase.from('gigs').select('*').order('id', { ascending: false });
            if (data) {
                document.getElementById('feed').innerHTML = data.map((gig, i) => `
                    <div class="glass-card p-8 flex flex-col md:flex-row gap-8 animate-card" style="animation-delay: ${i*0.1}s">
                        <img src="${gig.image_link || 'https://via.placeholder.com/400x600?text=Aurent+Vault'}" class="md:w-1/3 rounded-xl object-cover max-h-80">
                        <div class="flex-1">
                            <h3 class="text-2xl font-black mb-4 uppercase tracking-tighter">${gig.title}</h3>
                            <div class="text-slate-400 text-sm mb-8 leading-relaxed">${gig.description.substring(0, 300)}...</div>
                            <a href="${gig.apply_link}" target="_blank" class="block bg-white text-black text-center font-black py-4 rounded-lg uppercase text-[10px] tracking-widest">Apply Now</a>
                        </div>
                    </div>
                `).join('');
            }
        }

        // --- 🖋️ LUXURY CV GENERATOR LOGIC ---
        async function generateCV() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const theme = document.getElementById('cv-theme').value;
            const name = document.getElementById('cv-name').value || "Aurent Candidate";

            // Theme Config
            const colors = {
                Aurent: { main: [139, 30, 63], accent: [204, 172, 67] },
                Midnight: { main: [16, 42, 86], accent: [100, 116, 139] },
                Onyx: { main: [20, 20, 20], accent: [150, 150, 150] }
            }[theme];

            // Header Background
            doc.setFillColor(...colors.main);
            doc.rect(0, 0, 70, 297, 'F');

            // Title Header
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.text(name.toUpperCase(), 80, 25);
            doc.setDrawColor(...colors.accent);
            doc.setLineWidth(1);
            doc.line(80, 30, 200, 30);

            // Left Sidebar Text
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(10);
            doc.text("CONTACT", 10, 80);
            doc.text(document.getElementById('cv-phone').value, 10, 88);
            doc.text(document.getElementById('cv-email').value, 10, 94);

            doc.setFontSize(12);
            doc.text("CORE SKILLS", 10, 120);
            doc.setFontSize(9);
            const skills = document.getElementById('cv-skills').value.split(',').join('\n• ');
            doc.text("• " + skills, 10, 128);

            // Right Content
            doc.setTextColor(40, 40, 40);
            doc.setFontSize(14);
            doc.text("PROFESSIONAL SUMMARY", 80, 45);
            doc.setFontSize(10);
            doc.text(doc.splitTextToSize(document.getElementById('cv-summary').value, 110), 80, 52);

            doc.setFontSize(14);
            doc.text("WORK EXPERIENCE", 80, 90);
            doc.setFontSize(10);
            doc.text(doc.splitTextToSize(document.getElementById('cv-experience').value, 110), 80, 97);

            doc.setFontSize(14);
            doc.text("EDUCATION", 80, 180);
            doc.setFontSize(10);
            doc.text(doc.splitTextToSize(document.getElementById('cv-edu').value, 110), 80, 187);

            // Branding Footer
            doc.setFillColor(33, 33, 33);
            doc.rect(0, 287, 210, 10, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(7);
            doc.text("CERTIFIED BY AURENT STUDIOS VAULT 2026", 75, 293);

            // Handle Photo
            const photo = document.getElementById('cv-photo').files[0];
            if (photo) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    doc.addImage(e.target.result, 'JPEG', 10, 15, 50, 50);
                    doc.save(`${name}_CV.pdf`);
                };
                reader.readAsDataURL(photo);
            } else {
                doc.save(`${name}_CV.pdf`);
            }
        }

        if (!localStorage.getItem('aurent_init')) {
            document.getElementById('onboard-overlay').classList.remove('hidden');
        } else {
            loadFeed();
        }
    </script>
</body>
</html>
